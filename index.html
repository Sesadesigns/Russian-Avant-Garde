<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russian Avant Garde Library Welcome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Russian Avant Garde Library</h1>
    
  </header>

  <main class="landing-container">
    <section class="landing-text">
     
      <p class="landing-description">This is a web-library collection of Russian Avant Garde artists 
        divided by movements and disciplines. Enjoy introductory 
        biographies on a easy click and gallery wall on the right.</p>
    </section>
    <a href="main.html" class="enter-btn">Welcome to the Library</a>
  </main>

  <footer>
    
  </footer>
<script>
  function updateHeights() {
    const header = document.querySelector('header').offsetHeight;
    const topNav = document.querySelector('.nav-top').offsetHeight;
    const bottomNav = document.querySelector('.nav-bottom').offsetHeight;
    const total = header + topNav + bottomNav;
    document.documentElement.style.setProperty('--ui-height', total + 'px');
  }

  updateHeights(); // run on load
  window.addEventListener('resize', updateHeights); // run on every resize
</script>
</body>

</html>
